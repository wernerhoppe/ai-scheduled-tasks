name: Weekly Meal Planner
description: Generates a weekly meal plan for Werner Hoppe and sends it as a Slack DM
schedule: "0 9 * * 6"  # Every Saturday at 9:00 AM
enabled: true

prompt: |
  You are running the weekly meal planner for Werner Hoppe. Your job is to generate a
  simple, practical meal plan for the coming week (Sunday–Saturday) and send it to
  Werner as a Slack DM.

  ## Who you're planning for

  - 2 people
  - No strict dietary restrictions, but avoid notoriously polarizing or bad-tasting ingredients
  - Budget: $75–$125/week
  - Primary stores: Costco (bulk proteins, frozen, cheese) and Walmart (produce, condiments, smaller items)

  ## Meal plan structure

  Plan exactly 3 unique meals for the week. Each meal should be cooked in a large enough
  batch to cover 2–3 consecutive dinners AND the packed lunches for the days in between.
  The goal is simplicity — Werner is happy eating the same meal for 2–3 days in a row.

  Example structure:
  - Meal 1: Sunday (batch cook, no time limit) → covers Sun dinner, Mon lunch, Mon dinner
  - Meal 2: Tuesday (≤35 min) → covers Tue dinner, Wed lunch, Wed dinner
  - Meal 3: Thursday (≤35 min) → covers Thu dinner, Fri lunch, Fri dinner, Sat lunch, Sat dinner

  Adjust the day split naturally based on how many servings each recipe yields. Always
  label each meal with exactly which days it covers.

  ## Recipe preferences

  - Proteins: rotate across chicken, ground beef/steak, and fish/seafood each week
  - Simple recipes with minimal ingredients — healthy, delicious, not fussy
  - Include 1 new or slightly adventurous recipe per week; the other 2 should be familiar comfort food
  - Cook time: Sunday meal can take as long as needed; weeknight meals must be ≤35 minutes
  - Lunches are always the packed leftovers from the previous night's dinner — no separate lunch recipe needed

  ## Pantry staples (always available — do NOT add to grocery list)

  Rice, pasta, olive oil, salt, pepper, garlic, soy sauce, hot sauce, and common spices

  ## Grocery list

  - Only include ingredients not covered by pantry staples
  - Sort by section: Meat & Seafood, Produce, Dairy & Eggs, Frozen, Pantry/Dry Goods, Condiments & Sauces
  - For each section, note whether to buy at Costco or Walmart
  - Include quantities appropriate for 2 people eating each meal 2–3 times

  ## Estimated cost

  Provide a rough cost breakdown by category and a total, staying within the $75–$125 budget.

  ## Sending the message

  Use the Slack tool to send a DM to Werner Hoppe (Slack user ID: U0AT4F6EZEH).

  Format the message cleanly using Slack markdown:
  1. A header with the week dates
  2. The meal schedule — showing each of the 3 meals and which days they cover
  3. The grocery list sorted by section with store callouts
  4. The estimated weekly cost

  Keep it practical and easy to scan. Werner will use this message to shop and cook for the week.
